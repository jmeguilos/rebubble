name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore (optional)
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/rebubble.keystore"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No KEYSTORE_BASE64 secret — building unsigned debug APK"
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble signed release APK
        if: steps.signing.outputs.signed == 'true'
        env:
          REBUBBLE_KEYSTORE_PATH: ${{ runner.temp }}/rebubble.keystore
          REBUBBLE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          REBUBBLE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          REBUBBLE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease --stacktrace
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk dist/rebubble-${GITHUB_REF_NAME}.apk

      - name: Assemble debug APK (unsigned fallback)
        if: steps.signing.outputs.signed != 'true'
        run: |
          ./gradlew :app:assembleDebug --stacktrace
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk dist/rebubble-${GITHUB_REF_NAME}-unsigned-debug.apk

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
