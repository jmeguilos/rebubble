appId: app.rebubble.android
---
# Send-fail → tap retry. Start the fixture server with FAIL_FIRST_SEND=1:
#   FAIL_FIRST_SEND=1 node server.js
# Assumes onboarded state (run flow-onboard.yaml first). The server returns a single
# terminal HTTP 400 on the first /message/text, so FAILED UX appears quickly (no 5xx
# WorkManager backoff). Manual retry succeeds.
- launchApp
- extendedWaitUntil:
    visible: "Fixture Friends"
    timeout: 30000
- tapOn: "Fixture Friends"
- extendedWaitUntil:
    visible: "Message"
    timeout: 15000
- tapOn: "Message"
- inputText: "Fail then retry"
- tapOn:
    accessibilityText: "Send"
- extendedWaitUntil:
    visible: "Not sent — tap to retry"
    timeout: 30000
- tapOn: "Not sent — tap to retry"
- extendedWaitUntil:
    notVisible: "Not sent — tap to retry"
    timeout: 30000
